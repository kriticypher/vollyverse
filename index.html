<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VolleyVerse – Explore volleyball teams from around the world.">
  <title>VolleyVerse</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>


  <nav>
    <div class="nav-brand">🏐 VolleyVerse</div>
    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search teams...">
      <select id="filterSelect" class="control-select">
        <option value="all">All Countries</option>
      </select>
      <select id="sortSelect" class="control-select">
        <option value="default">Sort by Alphabetical Order</option>
        <option value="asc">A - Z</option>
        <option value="desc">Z - A</option>
      </select>
      <button id="themeToggle" class="theme-btn" title="Toggle Theme">🌙</button>
    </div>
  </nav>


  <div id="loader">
    <div class="loader-ball">🏐</div>
    <p>Loading teams...</p>
  </div>


  <div id="error" style="display:none;">
    <p>Could not load teams.</p>
    <button onclick="fetchTeams()">Retry</button>
  </div>


  <main id="teamsContainer"></main>


  <script src="script.js"></script>
</body>
</html>
